<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Screenshot Helper</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .stage {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .status {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.4;
      background: rgba(17, 24, 39, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="status" id="status">Cargando vista…</div>
    <iframe id="app" src="./sel-alfabeto.html"></iframe>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const frame = document.getElementById('app');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function boot() {
      setStatus('Esperando carga del iframe…');
      await new Promise((resolve) => {
        frame.addEventListener('load', resolve, { once: true });
      });
      setStatus('Iframe cargado. Abriendo chat…');

      const win = frame.contentWindow;
      if (!win || typeof win.openChatModal !== 'function') {
        setStatus('No se pudo acceder a openChatModal().');
        return;
      }

      try {
        await win.openChatModal();
        setStatus('Chat abierto. Esperando render…');
      } catch (error) {
        setStatus(`Error al abrir chat: ${error && error.message ? error.message : error}`);
        return;
      }

      await new Promise((resolve) => setTimeout(resolve, 7000));
      const overlay = win.document.getElementById('chat-overlay');
      const fileThumb = overlay ? overlay.querySelector('.chat-file-thumb-card.is-office-embed-preview, .chat-file-thumb-card.has-embed-preview, .chat-file-thumb-card.has-preview') : null;

      if (overlay && fileThumb) {
        fileThumb.scrollIntoView({ block: 'center', inline: 'nearest' });
        await new Promise((resolve) => setTimeout(resolve, 1200));
        setStatus('Lista la captura: miniatura detectada.');
        document.body.dataset.ready = '1';
      } else if (overlay) {
        setStatus('Chat abierto, pero no detecté miniatura de archivo en el tiempo esperado.');
        document.body.dataset.ready = 'chat-open';
      } else {
        setStatus('El chat no llegó a abrirse.');
        document.body.dataset.ready = 'chat-missing';
      }
    }

    boot();
  </script>
</body>
</html>
