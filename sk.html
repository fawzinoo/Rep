<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Comic Manga Interactivo</title>

  <style>

    body{
      margin:0;
      padding:20px;
      background:#ececec;
      font-family:Arial, sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    h1{
      margin-bottom:10px;
    }

    .instructions{
      margin-bottom:20px;
      text-align:center;
      max-width:700px;
      font-size:18px;
    }

    .comic-wrapper{
      position:relative;
      width:750px;
      max-width:95%;
    }

    .comic-wrapper img{
      width:100%;
      border:5px solid black;
      display:block;
      border-radius:10px;
    }

    .speech-bubble{
      position:absolute;
      background:rgba(255, 255, 255, 0.1);
      border:none;
      cursor:pointer;
      transition:0.3s;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:8px;
      font-weight:bold;
      padding:3px;
      line-height:1.0;
      color:#000;
      overflow:hidden;
      word-wrap:break-word;
      white-space:normal;
      width:15% !important;
      padding-bottom:20% !important;
    }

    .speech-bubble:hover{
      background:rgba(255, 255, 255, 0.3);
    }

    .speech-bubble.colored{
      background:rgba(135, 206, 235, 0.6) !important;
      border:2px solid #87CEEB !important;
    }

  </style>
</head>

<body>

<h1>Comic Manga Interactivo</h1>

<div class="instructions">
  Haz clic en los bocadillos de la foto para pintarlos.
</div>

<div class="comic-wrapper">

  <!-- IMAGEN -->
  <img src="https://fawzinoo.github.io/Fotos/oo.png" alt="Comic Manga">

  <!-- BOCADILLOS CON NÚMEROS -->
  <div class="speech-bubble" style="top:8%; left:6%; width:20%; padding-bottom:22%;">1</div>
  <div class="speech-bubble" style="top:10%; right:1%; width:20%; padding-bottom:22%;">2</div>
  <div class="speech-bubble" style="top:45%; left:5%; width:20%; padding-bottom:22%;">3</div>
  <div class="speech-bubble" style="top:45%; right:5%; width:20%; padding-bottom:22%;">4</div>
  <div class="speech-bubble" style="top:78%; left:5%; width:20%; padding-bottom:22%;">5</div>
  <div class="speech-bubble" style="top:78%; right:5%; width:20%; padding-bottom:22%;">6</div>

</div>


<script>

const dialogues = [
  "Buenos días. ¿Me podría recomendar algún plato?",
  "Con gusto. Nuestro plato estrella es el filete a la parrilla.",
  "Suena muy bien. ¿Y qué me recomienda para beber?",
  "Le sugiero nuestro vino tinto de la casa.",
  "Perfecto, entonces eso me gustaría.",
  "Será un placer atenderle. Enseguida se lo prepararemos."
];

function shuffle(array){
  return array.sort(() => Math.random() - 0.5);
}

const shuffled = shuffle([...dialogues]);
const bubbles = document.querySelectorAll(".speech-bubble");

// Distribuir diálogos aleatoriamente en los bocadillos
shuffled.forEach((text, index) => {
  if(bubbles[index]){
    bubbles[index].innerText = text;
  }
});

// Hacer los bocadillos clicables para pintarlos
bubbles.forEach(bubble => {
  bubble.addEventListener("click", () => {
    bubble.classList.toggle("colored");
  });
});

</script>

</body>
</html>
